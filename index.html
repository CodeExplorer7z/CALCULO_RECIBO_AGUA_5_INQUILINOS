<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CÁLCULO RECIBO AGUA</title>
    <link rel="icon" type="image/x-icon" href="recibo_agua.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --blue-dark: #2c3e50; --blue-light: #3498db; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* ESTILOS WEB */
        .main-card { border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--blue-light); }
        .input-editable { background-color: #fffde7 !important; border: 1px solid #fbc02d !important; font-size: 16px !important; }
        
        .tenant-name-input {
            border: 1px solid #fbc02d !important;
            background-color: #fffde7 !important;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            padding: 2px 5px;
            border-radius: 4px;
            color: var(--blue-dark);
        }

        .receipt-container { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; height: 100%; width: 100%; box-sizing: border-box; }
        .concept-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f1f1f1; }
        
        /* Estilo para el total */
        .total-box-web, .total-box-pdf { 
            background: var(--blue-dark); 
            color: white; 
            padding: 12px; 
            border-radius: 5px; 
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }

        .small-label { font-size: 0.72rem; font-weight: bold; display: block; color: #555; margin-bottom: 2px; }

        /* ESTILOS EXCLUSIVOS PARA EL PDF */
        .pdf-only-section { display: none; }

        .pdf-tenant-title {
            color: #3498db;
            font-weight: bold;
            font-size: 1.3rem;
            margin: 0;
        }

        .pdf-layout-fix {
            display: block !important;
            margin: 0 auto !important;
            padding: 15mm !important; 
            width: 100% !important;
            max-width: 190mm !important; 
            box-sizing: border-box !important;
        }

        .pdf-border-dashed {
            border: 2px dashed #ccc !important;
            padding: 10mm !important;
            border-radius: 5px !important;
        }

        .pdf-text-fix { font-size: 0.9rem !important; }

        @media (max-width: 768px) { .container { padding: 10px; } }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="text-center mb-4">
        <h2 class="fw-bold">CÁLCULO DE RECIBO DE AGUA</h2>
        <p class="text-muted">PARA CINCO INQUILINOS</p>
    </div>

    <div class="card main-card mb-5">
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-6 col-md-2"><label class="small-label">Lectura Anterior</label><input type="number" id="m_prev_r" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                <div class="col-6 col-md-2"><label class="small-label">Lectura Actual</label><input type="number" id="m_curr_r" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                <div class="col-6 col-md-2"><label class="small-label">Fecha Anterior</label><input type="date" id="m_prev_d" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                <div class="col-6 col-md-2"><label class="small-label">Fecha Actual</label><input type="date" id="m_curr_d" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                <div class="col-6 col-md-2"><label class="small-label">Agua S/.</label><input type="number" id="v_water" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                <div class="col-6 col-md-2"><label class="small-label">Alcantarillado</label><input type="number" id="v_sewer" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                <div class="col-6 col-md-2"><label class="small-label">Cargo Fijo</label><input type="number" id="v_fixed" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                <div class="col-6 col-md-2"><label class="small-label">Mora</label><input type="number" id="v_mora" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                <div class="col-6 col-md-2"><label class="small-label">N° Inquilinos</label><input type="number" id="n_tenants" class="form-control form-control-sm input-editable" value="1" oninput="calc()"></div>
                <div class="col-6 col-md-2"><label class="small-label">Redondeo Anterior</label><input type="number" id="v_red_ant" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                <div class="col-6 col-md-2"><label class="small-label">Redondeo Actual</label><input type="number" id="v_red_act" class="form-control form-control-sm input-editable" oninput="calc()"></div>
            </div>
        </div>
    </div>

    <div class="row g-4" id="tenants_grid"></div>
</div>

<script>
    const meses = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];

    function calc() {
        const getVal = (id) => parseFloat(document.getElementById(id)?.value) || 0;
        const mainDateVal = document.getElementById('m_curr_d').value;
        const mainPrevDateVal = document.getElementById('m_prev_d').value;
        let mesTexto = mainDateVal ? meses[new Date(mainDateVal + "T00:00:00").getMonth()] : "---";

        const d = {
            mPrevD: new Date(mainPrevDateVal + "T00:00:00"),
            mCurrD: new Date(mainDateVal + "T00:00:00"),
            mPrevR: getVal('m_prev_r'), mCurrR: getVal('m_curr_r'),
            vWater: getVal('v_water'), vSewer: getVal('v_sewer'), vFixed: getVal('v_fixed'),
            vMora: getVal('v_mora'), vRedAnt: getVal('v_red_ant'), vRedAct: getVal('v_red_act'),
            nTenants: parseInt(document.getElementById('n_tenants').value) || 1
        };

        let totalDays = 0;
        if (!isNaN(d.mCurrD) && !isNaN(d.mPrevD)) {
            totalDays = Math.floor((d.mCurrD - d.mPrevD) / 864e5) + 1;
        }
        totalDays = totalDays > 0 ? totalDays : 0;

        const diffTotal = d.mCurrR - d.mPrevR;
        const tAgua = diffTotal > 0 ? (d.vWater / diffTotal) : 0;
        const tDesague = diffTotal > 0 ? (d.vSewer / diffTotal) : 0;

        for (let i = 1; i <= 5; i++) {
            const elPrev = document.getElementById(`i${i}_prev_r`);
            if (!elPrev) continue;

            const iPrevR = parseFloat(elPrev.value) || 0;
            const iCurrR = parseFloat(document.getElementById(`i${i}_curr_r`).value) || 0;
            const iPrevD = new Date(document.getElementById(`i${i}_prev_d`).value + "T00:00:00");
            const iCurrD = new Date(document.getElementById(`i${i}_curr_d`).value + "T00:00:00");

            let iDays = 0;
            if (!isNaN(iCurrD) && !isNaN(iPrevD)) {
                iDays = Math.floor((iCurrD - iPrevD) / 864e5) + 1;
            }
            const iDiff = iCurrR - iPrevR;
            const iDaily = (iDays > 0 && iDiff > 0) ? (iDiff / iDays) : 0;
            const iConsMes = iDaily * totalDays;

            const cWater = tAgua * iConsMes;
            const cSewer = tDesague * iConsMes;
            const cFixed = d.vFixed / d.nTenants;
            const cIgv = 0.18 * (cWater + cSewer + cFixed);
            const cMora = d.vMora / d.nTenants;
            const cRedAnt = d.vRedAnt / d.nTenants;
            const cRedAct = d.vRedAct / d.nTenants;
            const total = cWater + cSewer + cFixed + cIgv + cMora + cRedAnt + cRedAct;

            // Actualizar textos PDF
            document.getElementById(`pdf_mes_${i}`).innerText = mesTexto;
            document.getElementById(`pdf_lec_txt_${i}`).innerText = `${iPrevR.toFixed(2)} (ANT) - ${iCurrR.toFixed(2)} (ACT)`;
            document.getElementById(`pdf_tenant_name_${i}`).innerText = document.getElementById(`i${i}_name`).value;
            
            // Actualizar Total PDF
            if(document.getElementById(`i${i}_pdf_total_val`)) {
                document.getElementById(`i${i}_pdf_total_val`).innerText = total.toFixed(2);
            }

            const safeSet = (id, val) => { if(document.getElementById(id)) document.getElementById(id).innerText = val.toFixed(2); };
            safeSet(`i${i}_res_cons`, iConsMes);
            safeSet(`i${i}_val_water`, cWater);
            safeSet(`i${i}_val_sewer`, cSewer);
            safeSet(`i${i}_val_fixed`, cFixed);
            safeSet(`i${i}_val_igv`, cIgv);
            safeSet(`i${i}_val_mora`, cMora);
            safeSet(`i${i}_val_red_ant`, cRedAnt);
            safeSet(`i${i}_val_red_act`, cRedAct);
            safeSet(`i${i}_val_total`, total);
        }
    }

    function render() {
        const grid = document.getElementById('tenants_grid');
        let html = '';
        for(let i=1; i<=5; i++) {
            html += `
            <div class="col-lg-4 col-md-6 col-12">
                <div class="receipt-container" id="pdf_area_${i}">
                    <div id="pdf_content_wrapper_${i}">
                        <div id="pdf_header_${i}" class="pdf-only-section mb-4">
                            <h2 class="fw-bold m-0" style="color:#2c3e50; font-size: 1.5rem;">RECIBO DE AGUA</h2>
                            <p class="fw-bold mb-0">MES: <span id="pdf_mes_${i}">---</span></p>
                            <p class="pdf-tenant-title" id="pdf_tenant_name_${i}">Inquilino #${i}</p>
                        </div>

                        <div id="pdf_lecturas_${i}" class="pdf-only-section border-bottom pb-2 mb-3">
                            <span class="fw-bold" style="font-size: 0.9rem;" id="pdf_lec_txt_${i}">0.00 (ANT) - 0.00 (ACT)</span>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3 d-print-none" id="web_header_${i}">
                            <input type="text" id="i${i}_name" class="tenant-name-input" value="Inquilino #${i}" oninput="calc()">
                            <button class="btn btn-danger btn-sm ms-2" onclick="exportPDF(${i})">PDF</button>
                        </div>

                        <div class="row g-2 mb-3 d-print-none" id="inputs_${i}">
                            <div class="col-6"><label class="small-label">Lectura Anterior</label><input type="number" id="i${i}_prev_r" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                            <div class="col-6"><label class="small-label">Lectura Actual</label><input type="number" id="i${i}_curr_r" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                            <div class="col-6"><label class="small-label">Fecha Anterior</label><input type="date" id="i${i}_prev_d" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                            <div class="col-6"><label class="small-label">Fecha Actual</label><input type="date" id="i${i}_curr_d" class="form-control form-control-sm input-editable" oninput="calc()"></div>
                        </div>

                        <div class="concept-item fw-bold pdf-text-fix"><span>Consumo:</span><span><span id="i${i}_res_cons">0.00</span> m³</span></div>
                        <div class="concept-item pdf-text-fix"><span>Agua</span><span>S/ <span id="i${i}_val_water">0.00</span></span></div>
                        <div class="concept-item pdf-text-fix"><span>Alcantarillado</span><span>S/ <span id="i${i}_val_sewer">0.00</span></span></div>
                        <div class="concept-item pdf-text-fix"><span>Cargo Fijo</span><span>S/ <span id="i${i}_val_fixed">0.00</span></span></div>
                        <div class="concept-item pdf-text-fix"><span>IGV (18%)</span><span>S/ <span id="i${i}_val_igv">0.00</span></span></div>
                        <div class="concept-item pdf-text-fix"><span>Mora</span><span>S/ <span id="i${i}_val_mora">0.00</span></span></div>
                        <div class="concept-item pdf-text-fix"><span>Redondeo Anterior</span><span>S/ <span id="i${i}_val_red_ant">0.00</span></span></div>
                        <div class="concept-item pdf-text-fix"><span>Redondeo Actual</span><span>S/ <span id="i${i}_val_red_act">0.00</span></span></div>

                        <div class="total-box-web d-flex justify-content-between d-print-none" id="web_total_${i}">
                            <span>TOTAL A PAGAR</span>
                            <span class="fw-bold">S/. <span id="i${i}_val_total">0.00</span></span>
                        </div>

                        <div id="pdf_total_box_${i}" class="total-box-pdf pdf-only-section">
                            TOTAL A PAGAR: S/ <span id="i${i}_pdf_total_val">0.00</span>
                        </div>
                    </div>
                </div>
            </div>`;
        }
        grid.innerHTML = html;
        calc();
    }

    async function exportPDF(id) {
        const element = document.getElementById(`pdf_area_${id}`);
        const wrapper = document.getElementById(`pdf_content_wrapper_${id}`);
        const hPdf = document.getElementById(`pdf_header_${id}`);
        const lPdf = document.getElementById(`pdf_lecturas_${id}`);
        const tPdf = document.getElementById(`pdf_total_box_${id}`);
        
        const hWeb = document.getElementById(`web_header_${id}`);
        const iWeb = document.getElementById(`inputs_${id}`);
        const tWeb = document.getElementById(`web_total_${id}`);

        hPdf.style.display = 'block';
        lPdf.style.display = 'block';
        tPdf.style.display = 'block';
        
        element.classList.add('pdf-layout-fix');
        wrapper.classList.add('pdf-border-dashed'); 
        
        hWeb.style.setProperty('display', 'none', 'important');
        iWeb.style.setProperty('display', 'none', 'important');
        tWeb.style.setProperty('display', 'none', 'important');

        const opt = {
            margin: [5, 5, 5, 5], 
            filename: `Recibo_${document.getElementById(`i${id}_name`).value}.pdf`,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        try {
            await html2pdf().set(opt).from(element).save();
        } finally {
            hPdf.style.display = 'none';
            lPdf.style.display = 'none';
            tPdf.style.display = 'none';
            
            element.classList.remove('pdf-layout-fix');
            wrapper.classList.remove('pdf-border-dashed');
            
            hWeb.style.setProperty('display', 'flex', 'important');
            iWeb.style.setProperty('display', 'flex', 'important');
            tWeb.style.setProperty('display', 'flex', 'important');
        }
    }

    window.onload = render;
</script>

</body>
</html>
