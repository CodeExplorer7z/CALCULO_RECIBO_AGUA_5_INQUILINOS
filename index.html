<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULO RECIBO AGUA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --blue-dark: #2c3e50; --blue-light: #3498db; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; color: #333; }
        .main-card { border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--blue-light); }
        
        .input-editable { 
            background-color: #fffde7 !important; 
            border: 1px solid #fbc02d !important;
        }
        .input-editable:focus {
            background-color: #fff9c4 !important;
            border-color: #f9a825 !important;
            box-shadow: 0 0 0 0.25rem rgba(251, 192, 45, 0.25);
        }

        .receipt-container { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #ddd;
            position: relative;
            height: 100%;
        }
        .receipt-header { border-bottom: 2px solid var(--blue-dark); margin-bottom: 15px; padding-bottom: 10px; }
        .concept-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f1f1f1; }
        .total-box { background: var(--blue-dark); color: white; padding: 10px; border-radius: 5px; margin-top: 15px; }
        
        .btn-pdf { background-color: #e74c3c; color: white; border: none; transition: 0.3s; }
        .btn-pdf:hover { background-color: #c0392b; color: white; }

        @media (max-width: 768px) { .container { padding: 10px; } }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="text-center mb-4">
        <h2 class="fw-bold">CÁLCULO DE RECIBO DE AGUA - SEDAPAL</h2>
        <p class="text-muted">CINCO INQUILINOS</p>
    </div>

    <div class="card main-card mb-5">
        <div class="card-header bg-white fw-bold text-primary">RELLENAR LOS DATOS DEL RECIBO TOTAL DE AGUA</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="small fw-bold">Lectura Anterior</label>
                    <input type="number" id="m_prev_r" class="form-control form-control-sm input-editable" value="" oninput="calc()">
                </div>
                <div class="col-md-2">
                    <label class="small fw-bold">Lectura Actual</label>
                    <input type="number" id="m_curr_r" class="form-control form-control-sm input-editable" value="" oninput="calc()">
                </div>
                <div class="col-md-2">
                    <label class="small fw-bold">Fecha Lectura Anterior</label>
                    <input type="date" id="m_prev_d" class="form-control form-control-sm input-editable" value="0000-00-00" oninput="calc()">
                </div>
                <div class="col-md-2">
                    <label class="small fw-bold">Fecha Lectura Actual</label>
                    <input type="date" id="m_curr_d" class="form-control form-control-sm input-editable" value="0000-00-00" oninput="calc()">
                </div>
                <div class="col-md-2 col-6">
                    <label class="small fw-bold">Agua (S/.)</label>
                    <input type="number" id="v_water" class="form-control form-control-sm input-editable" value="" oninput="calc()">
                </div>
                <div class="col-md-2 col-6">
                    <label class="small fw-bold">Alcantarillado</label>
                    <input type="number" id="v_sewer" class="form-control form-control-sm input-editable" value="" oninput="calc()">
                </div>
                <div class="col-md-2 col-6">
                    <label class="small fw-bold">Cargo Fijo</label>
                    <input type="number" id="v_fixed" class="form-control form-control-sm input-editable" value="" oninput="calc()">
                </div>
                <div class="col-md-2 col-6">
                    <label class="small fw-bold">Mora</label>
                    <input type="number" id="v_mora" class="form-control form-control-sm input-editable" value="" oninput="calc()">
                </div>
                <div class="col-md-2 col-6">
                    <label class="small fw-bold">N° Inquilinos</label>
                    <input type="number" id="n_tenants" class="form-control form-control-sm input-editable" value="" oninput="calc()">
                </div>
                <div class="col-md-2 col-6">
                    <label class="small fw-bold">Redondeo Anterior</label>
                    <input type="number" id="v_red_ant" class="form-control form-control-sm input-editable" value="" oninput="calc()">
                </div>
                <div class="col-md-2 col-6">
                    <label class="small fw-bold">Redondeo Actual</label>
                    <input type="number" id="v_red_act" class="form-control form-control-sm input-editable" value="" oninput="calc()">
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4" id="tenants_grid"></div>
</div>

<script>
    function calc() {
        const getVal = (id) => parseFloat(document.getElementById(id)?.value) || 0;
        
        const d = {
            mPrevR: getVal('m_prev_r'),
            mCurrR: getVal('m_curr_r'),
            mPrevD: new Date(document.getElementById('m_prev_d').value),
            mCurrD: new Date(document.getElementById('m_curr_d').value),
            vWater: getVal('v_water'),
            vSewer: getVal('v_sewer'),
            vFixed: getVal('v_fixed'),
            vMora: getVal('v_mora'),
            vRedAnt: getVal('v_red_ant'),
            vRedAct: getVal('v_red_act'),
            nTenants: parseInt(document.getElementById('n_tenants').value) || 1
        };

        let totalDays = 0;
        if (!isNaN(d.mCurrD) && !isNaN(d.mPrevD)) {
            totalDays = Math.floor((d.mCurrD - d.mPrevD) / (864e5)) + 1;
        }
        totalDays = totalDays > 0 ? totalDays : 0;

        const diffTotal = d.mCurrR - d.mPrevR;
        const tAgua = diffTotal > 0 ? (d.vWater / diffTotal) : 0;
        const tDesague = diffTotal > 0 ? (d.vSewer / diffTotal) : 0;

        // Bucle extendido a 5 inquilinos
        for (let i = 1; i <= 5; i++) {
            const elPrev = document.getElementById(`i${i}_prev_r`);
            if (!elPrev) continue; 

            const iPrevR = parseFloat(elPrev.value) || 0;
            const iCurrR = parseFloat(document.getElementById(`i${i}_curr_r`).value) || 0;
            const iPrevD = new Date(document.getElementById(`i${i}_prev_d`).value);
            const iCurrD = new Date(document.getElementById(`i${i}_curr_d`).value);

            let iDays = 0;
            if (!isNaN(iCurrD) && !isNaN(iPrevD)) {
                iDays = Math.floor((iCurrD - iPrevD) / (864e5)) + 1;
            }
            iDays = iDays > 0 ? iDays : 0;

            const iDiff = iCurrR - iPrevR;
            const iDaily = (iDays > 0 && iDiff > 0) ? (iDiff / iDays) : 0;
            const iConsMes = iDaily * totalDays;

            const cWater = tAgua * iConsMes;
            const cSewer = tDesague * iConsMes;
            const cFixed = d.vFixed / d.nTenants;
            const cIgv = 0.18 * (cWater + cSewer + cFixed);
            const cMora = d.vMora / d.nTenants;
            const cRedAnt = d.vRedAnt / d.nTenants;
            const cRedAct = d.vRedAct / d.nTenants;
            
            const total = cWater + cSewer + cFixed + cIgv + cMora + cRedAnt + cRedAct;

            const safeSetText = (id, val) => {
                const el = document.getElementById(id);
                if (el) el.innerText = (isNaN(val) || !isFinite(val)) ? "0.00" : val.toFixed(2);
            };

            safeSetText(`i${i}_res_cons`, iConsMes);
            safeSetText(`i${i}_val_water`, cWater);
            safeSetText(`i${i}_val_sewer`, cSewer);
            safeSetText(`i${i}_val_fixed`, cFixed);
            safeSetText(`i${i}_val_igv`, cIgv);
            safeSetText(`i${i}_val_mora`, cMora);
            safeSetText(`i${i}_val_red_ant`, cRedAnt);
            safeSetText(`i${i}_val_red_act`, cRedAct);
            safeSetText(`i${i}_val_total`, total);
        }
    }

    function render() {
        const grid = document.getElementById('tenants_grid');
        let html = '';
        // Renderizado extendido a 5 inquilinos
        for(let i=1; i<=5; i++) {
            html += `
            <div class="col-lg-4 col-md-6">
                <div class="receipt-container" id="pdf_area_${i}">
                    <div class="receipt-header d-flex justify-content-between align-items-center">
                        <div>
                            <input type="text" class="form-control form-control-sm border-0 p-0 fw-bold" 
                                value="Inquilino #${i}" style="background: transparent; color: var(--blue-dark); font-size: 1.2rem;">
                        </div>
                        <button class="btn btn-pdf btn-sm d-print-none" onclick="exportPDF(${i})" id="btn_pdf_${i}">PDF</button>
                    </div>

                    <div class="mb-3">
                        <div class="row g-1 mb-2 d-print-none" id="inputs_${i}">
                            <div class="col-6">
                                <label class="small fw-bold">Lectura Anterior</label>
                                <input type="number" id="i${i}_prev_r" class="form-control form-control-sm input-editable" oninput="calc()">
                            </div>
                            <div class="col-6">
                                <label class="small fw-bold">Lectura Actual</label>
                                <input type="number" id="i${i}_curr_r" class="form-control form-control-sm input-editable" oninput="calc()">
                            </div>
                            <div class="col-6">
                                <label class="small fw-bold">Fecha Anterior</label>
                                <input type="date" id="i${i}_prev_d" class="form-control form-control-sm input-editable" oninput="calc()">
                            </div>
                            <div class="col-6">
                                <label class="small fw-bold">Fecha Actual</label>
                                <input type="date" id="i${i}_curr_d" class="form-control form-control-sm input-editable" oninput="calc()">
                            </div>
                        </div>
                        <div class="concept-item"><span>Consumo estimado:</span><strong><span id="i${i}_res_cons">0</span> m³</strong></div>
                    </div>

                    <div class="concepts small">
                        <div class="concept-item"><span>Agua</span><span> <span id="i${i}_val_water">0</span></span></div>
                        <div class="concept-item"><span>Alcantarillado</span><span> <span id="i${i}_val_sewer">0</span></span></div>
                        <div class="concept-item"><span>Cargo Fijo</span><span> <span id="i${i}_val_fixed">0</span></span></div>
                        <div class="concept-item"><span>IGV (18%)</span><span> <span id="i${i}_val_igv">0</span></span></div>
                        <div class="concept-item"><span>Mora</span><span> <span id="i${i}_val_mora">0</span></span></div>
                        <div class="concept-item"><span>Redondeo Anterior</span><span> <span id="i${i}_val_red_ant">0</span></span></div>
                        <div class="concept-item"><span>Redondeo Actual</span><span> <span id="i${i}_val_red_act">0</span></span></div>
                    </div>

                    <div class="total-box d-flex justify-content-between">
                        <span>TOTAL A PAGAR</span>
                        <span class="fw-bold">S/. <span id="i${i}_val_total">0</span></span>
                    </div>
                </div>
            </div>`;
        }
        grid.innerHTML = html;
        setTimeout(calc, 100);
    }

    async function exportPDF(id) {
        const element = document.getElementById(`pdf_area_${id}`);
        const button = document.getElementById(`btn_pdf_${id}`);
        const inputs = document.getElementById(`inputs_${id}`);

        if (!element) return;

        button.style.visibility = 'hidden';
        if (inputs) inputs.style.setProperty('display', 'none', 'important');

        const opt = {
            margin: [10, 5, 10, 5],
            filename: `Recibo_Inquilino_${id}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, letterRendering: true, scrollY: 0 },
            jsPDF: { unit: 'mm', format: 'a5', orientation: 'portrait' }
        };

        try {
            await html2pdf().set(opt).from(element).save();
        } catch (error) {
            console.error("Error al generar PDF:", error);
        } finally {
            button.style.visibility = 'visible';
            if (inputs) inputs.style.setProperty('display', 'flex', 'important');
        }
    }
    window.onload = render;
</script>

</body>
</html>
